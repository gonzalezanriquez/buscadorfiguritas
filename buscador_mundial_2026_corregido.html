<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador Mundial 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 90% 0%, rgba(255,255,255,0.08) 0 28%, transparent 29%),
        radial-gradient(circle at 95% 85%, rgba(255,255,255,0.06) 0 35%, transparent 36%),
        linear-gradient(135deg, #4b0710, #7b1520 55%, #4b0710);
      padding: 22px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      margin: auto;
    }

    .header {
      padding: 26px 0 28px;
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo-mundial {
      width: 110px;
      max-width: 30%;
      display: block;
      flex-shrink: 0;
    }

    .hero-texto {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 12vw, 80px);
      line-height: 0.9;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge {
      color: #f4b6a9;
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 16px;
    }

    .subtitulo {
      margin-top: 28px;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.45;
      color: #f8e8e5;
    }

    .card {
      background: transparent;
      padding: 0;
      margin-top: 0;
    }

    .buscador {
      position: relative;
    }

    .lupa {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b1520;
      font-size: 22px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 19px 22px 19px 54px;
      font-size: 18px;
      border-radius: 999px;
      border: none;
      outline: none;
      color: #64101a;
      background: white;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }

    input::placeholder {
      color: #9b6b70;
    }

    input:focus {
      box-shadow: 0 0 0 4px rgba(244,182,169,0.35), 0 12px 28px rgba(0,0,0,0.18);
    }

    .ayuda {
      font-size: 14px;
      margin: 14px 4px 0;
      color: #f2c5bd;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .chip {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      background: #ffffff;
      color: #6b1320;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
    }

    .chip:hover {
      transform: translateY(-2px);
      background: #f8d8d1;
    }

    .resultado {
      display: none;
      margin-top: 24px;
      background: rgba(255,255,255,0.96);
      color: #59101a;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 35px rgba(0,0,0,0.22);
    }

    .resultado-header {
      padding: 18px 22px;
      background: #f0a092;
      color: #59101a;
      font-size: 22px;
      font-weight: 800;
    }

    .resultado-body {
      padding: 20px 22px;
    }

    .dato {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid #edd0cb;
      font-size: 18px;
    }

    .dato:last-child {
      border-bottom: none;
    }

    .dato span:first-child {
      color: #7b1520;
      font-weight: 700;
    }

    .pagina {
      font-size: 46px;
      font-weight: 900;
      color: #7b1520;
    }

    .no-encontrado .resultado-header {
      background: #7b1520;
      color: white;
    }

    .footer {
      margin-top: 34px;
      color: #f2c5bd;
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .hero {
        gap: 16px;
      }

      .logo-mundial {
        width: 84px;
        max-width: 28%;
      }

      h1 {
        font-size: clamp(42px, 13vw, 58px);
        letter-spacing: 2px;
      }

      .badge {
        font-size: 14px;
        letter-spacing: 3px;
        margin-top: 12px;
      }

      .subtitulo {
        font-size: 16px;
      }

      .chip {
        flex: 1;
        padding: 13px 12px;
      }
    }

    @media (max-width: 350px) {
      .logo-mundial {
        width: 70px;
      }

      h1 {
        font-size: 38px;
      }

      .badge {
        font-size: 12px;
        letter-spacing: 2px;
      }
    }
  </style>
</head>

<body>

  <main class="app">

    <section class="header">
      <div class="hero">
        <img
          src="logo.png"
          class="logo-mundial"
          alt="Logo Mundial 2026"
        >

        <div class="hero-texto">
          <h1>FIFA 2026</h1>
          <div class="badge">Buscador de páginas</div>
        </div>
      </div>

      <!-- <p class="subtitulo">
        Consultá rápidamente por país o por código FIFA de tres letras para encontrar la página correspondiente en tu álbum.
      </p> -->
    </section>

    <section class="card">
      <div class="buscador">
        <span class="lupa">⌕</span>
        <input
          type="text"
          id="busqueda"
          placeholder="Ej: ARG, Argentina, BRA..."
          autocomplete="off"
          oninput="buscarEquipo()"
        />
      </div>

      <p class="ayuda">
        Escribí el país completo, parte del nombre o el código FIFA.
      </p>

      <div id="resultado" class="resultado"></div>

      <div class="chips">
        <button class="chip" onclick="buscarRapido('ARG')">ARG</button>
        <button class="chip" onclick="buscarRapido('BRA')">BRA</button>
        <button class="chip" onclick="buscarRapido('MEX')">MEX</button>
        <button class="chip" onclick="buscarRapido('USA')">USA</button>
        <button class="chip" onclick="buscarRapido('ESP')">ESP</button>
        <button class="chip" onclick="buscarRapido('FRA')">FRA</button>
      </div>
    </section>

    <p class="footer">
      Álbum Mundial 2026 · Canadá · México · Estados Unidos
    </p>

  </main>

  <script>
    const equipos = [
      { pagina: 8, codigo: "MEX", pais: "Mexico", bandera: "🇲🇽", grupo: "A" },
      { pagina: 10, codigo: "RSA", pais: "South Africa", bandera: "🇿🇦", grupo: "A" },
      { pagina: 12, codigo: "KOR", pais: "Korea Republic", bandera: "🇰🇷", grupo: "A" },
      { pagina: 14, codigo: "CZE", pais: "Czechia", bandera: "🇨🇿", grupo: "A" },

      { pagina: 16, codigo: "CAN", pais: "Canada", bandera: "🇨🇦", grupo: "B" },
      { pagina: 18, codigo: "BIH", pais: "Bosnia-Herzegovina", bandera: "🇧🇦", grupo: "B" },
      { pagina: 20, codigo: "QAT", pais: "Qatar", bandera: "🇶🇦", grupo: "B" },
      { pagina: 22, codigo: "SUI", pais: "Switzerland", bandera: "🇨🇭", grupo: "B" },

      { pagina: 24, codigo: "BRA", pais: "Brazil", bandera: "🇧🇷", grupo: "C" },
      { pagina: 26, codigo: "MAR", pais: "Morocco", bandera: "🇲🇦", grupo: "C" },
      { pagina: 28, codigo: "HAI", pais: "Haiti", bandera: "🇭🇹", grupo: "C" },
      { pagina: 30, codigo: "SCO", pais: "Scotland", bandera: "🏴", grupo: "C" },

      { pagina: 32, codigo: "USA", pais: "USA", bandera: "🇺🇸", grupo: "D" },
      { pagina: 34, codigo: "PAR", pais: "Paraguay", bandera: "🇵🇾", grupo: "D" },
      { pagina: 36, codigo: "AUS", pais: "Australia", bandera: "🇦🇺", grupo: "D" },
      { pagina: 38, codigo: "TUR", pais: "Türkiye", bandera: "🇹🇷", grupo: "D" },

      { pagina: 40, codigo: "GER", pais: "Germany", bandera: "🇩🇪", grupo: "E" },
      { pagina: 42, codigo: "CUW", pais: "Curaçao", bandera: "🇨🇼", grupo: "E" },
      { pagina: 44, codigo: "CIV", pais: "Côte d’Ivoire", bandera: "🇨🇮", grupo: "E" },
      { pagina: 46, codigo: "ECU", pais: "Ecuador", bandera: "🇪🇨", grupo: "E" },

      { pagina: 48, codigo: "NED", pais: "Netherlands", bandera: "🇳🇱", grupo: "F" },
      { pagina: 50, codigo: "JPN", pais: "Japan", bandera: "🇯🇵", grupo: "F" },
      { pagina: 52, codigo: "SWE", pais: "Sweden", bandera: "🇸🇪", grupo: "F" },
      { pagina: 54, codigo: "TUN", pais: "Tunisia", bandera: "🇹🇳", grupo: "F" },

      { pagina: 58, codigo: "BEL", pais: "Belgium", bandera: "🇧🇪", grupo: "G" },
      { pagina: 60, codigo: "EGY", pais: "Egypt", bandera: "🇪🇬", grupo: "G" },
      { pagina: 62, codigo: "IRN", pais: "IR Iran", bandera: "🇮🇷", grupo: "G" },
      { pagina: 64, codigo: "NZL", pais: "New Zealand", bandera: "🇳🇿", grupo: "G" },

      { pagina: 66, codigo: "ESP", pais: "Spain", bandera: "🇪🇸", grupo: "H" },
      { pagina: 68, codigo: "CPV", pais: "Cabo Verde", bandera: "🇨🇻", grupo: "H" },
      { pagina: 70, codigo: "KSA", pais: "Saudi Arabia", bandera: "🇸🇦", grupo: "H" },
      { pagina: 72, codigo: "URU", pais: "Uruguay", bandera: "🇺🇾", grupo: "H" },

      { pagina: 74, codigo: "FRA", pais: "France", bandera: "🇫🇷", grupo: "I" },
      { pagina: 76, codigo: "SEN", pais: "Senegal", bandera: "🇸🇳", grupo: "I" },
      { pagina: 78, codigo: "IRQ", pais: "Iraq", bandera: "🇮🇶", grupo: "I" },
      { pagina: 80, codigo: "NOR", pais: "Norway", bandera: "🇳🇴", grupo: "I" },

      { pagina: 82, codigo: "ARG", pais: "Argentina", bandera: "🇦🇷", grupo: "J" },
      { pagina: 84, codigo: "ALG", pais: "Algeria", bandera: "🇩🇿", grupo: "J" },
      { pagina: 86, codigo: "AUT", pais: "Austria", bandera: "🇦🇹", grupo: "J" },
      { pagina: 88, codigo: "JOR", pais: "Jordan", bandera: "🇯🇴", grupo: "J" },

      { pagina: 90, codigo: "POR", pais: "Portugal", bandera: "🇵🇹", grupo: "K" },
      { pagina: 92, codigo: "COD", pais: "Congo DR", bandera: "🇨🇩", grupo: "K" },
      { pagina: 94, codigo: "UZB", pais: "Uzbekistan", bandera: "🇺🇿", grupo: "K" },
      { pagina: 96, codigo: "COL", pais: "Colombia", bandera: "🇨🇴", grupo: "K" },

      { pagina: 98, codigo: "ENG", pais: "England", bandera: "🏴", grupo: "L" },
      { pagina: 100, codigo: "CRO", pais: "Croatia", bandera: "🇭🇷", grupo: "L" },
      { pagina: 102, codigo: "GHA", pais: "Ghana", bandera: "🇬🇭", grupo: "L" },
      { pagina: 104, codigo: "PAN", pais: "Panama", bandera: "🇵🇦", grupo: "L" }
    ];

    function normalizar(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function buscarEquipo() {
      const valorOriginal = document.getElementById("busqueda").value.trim();
      const valor = normalizar(valorOriginal);
      const resultado = document.getElementById("resultado");

      if (valor === "") {
        resultado.style.display = "none";
        return;
      }

      const equipo = equipos.find(e =>
        normalizar(e.codigo).startsWith(valor) ||
        normalizar(e.pais).includes(valor)
      );

      resultado.style.display = "block";

      if (equipo) {
        resultado.className = "resultado";
        resultado.innerHTML = `
          <div class="resultado-header">
            ${equipo.bandera} ${equipo.pais}
          </div>
          <div class="resultado-body">
            <div class="dato">
              <span>Código</span>
              <strong>${equipo.codigo}</strong>
            </div>
            <div class="dato">
              <span>Grupo</span>
              <strong>${equipo.grupo}</strong>
            </div>
            <div class="dato">
              <span>Página</span>
              <strong class="pagina">${equipo.pagina}</strong>
            </div>
          </div>
        `;
      } else {
        resultado.className = "resultado no-encontrado";
        resultado.innerHTML = `
          <div class="resultado-header">
            No encontrado
          </div>
          <div class="resultado-body">
            No se encontró "${valorOriginal}".
          </div>
        `;
      }
    }

    function buscarRapido(codigo) {
      document.getElementById("busqueda").value = codigo;
      buscarEquipo();
    }
  </script>

</body>
</html>
